name: Data Lakehouse Orchestration

on:
  schedule:
    - cron: '0 0 * * *'
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13.2'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          pip install dbt-duckdb

      - name: Ingest Micro-Batch Data
        env:
          R2_ACCESS_KEY: ${{ secrets.R2_ACCESS_KEY }}
          R2_SECRET_KEY: ${{ secrets.R2_SECRET_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: |
          python producer.py

      - name: Execute dbt Medallion Pipeline
        env:
          DBT_R2_ACCESS_KEY: ${{ secrets.R2_ACCESS_KEY }}
          DBT_R2_SECRET_KEY: ${{ secrets.R2_SECRET_KEY }}
          DBT_R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: |
          cd transform
          
          echo "
          transform:
            target: dev
            outputs:
              dev:
                type: duckdb
                path: dev.duckdb
                extensions:
                  - httpfs
                settings:
                  s3_access_key_id: \"{{ env_var('DBT_R2_ACCESS_KEY') }}\"
                  s3_secret_access_key: \"{{ env_var('DBT_R2_SECRET_KEY') }}\"
                  s3_endpoint: \"{{ env_var('DBT_R2_ENDPOINT') }}\"
                  s3_url_style: 'path'
                  s3_region: 'auto'
          " > profiles.yml
          
          dbt deps
          dbt run --target dev
          dbt test --target dev