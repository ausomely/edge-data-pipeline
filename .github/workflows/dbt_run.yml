name: End-to-End Clickstream Pipeline

on:
  push:
    branches:
      - main
  schedule:
    # Runs automatically every day at 12:00 AM UTC
    - cron: '0 0 * * *'

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Clone your repository onto the virtual cloud runner
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Set up a secure Python environment
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # Step 3: Install project dependencies
      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install dbt-duckdb
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # Step 4: Run the Python Event Streamer to drop fresh data into R2
      - name: Run Micro-Batch Ingestion Producer
        env:
          CLOUDFLARE_R2_ACCESS_KEY: ${{ secrets.R2_ACCESS_KEY }}
          CLOUDFLARE_R2_SECRET_KEY: ${{ secrets.R2_SECRET_KEY }}
          CLOUDFLARE_R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: |
          python producer.py
      # Step 4.5: Network Diagnostics Check
      - name: Network Connectivity Test
        run: |
          echo "=== Testing Internet Access ==="
          curl -I https://www.google.com
          
          echo "=== Testing Cloudflare Connection ==="
          # This will test if the runner can actually resolve your endpoint domain
          curl -I https://${{ secrets.R2_ENDPOINT }}
      # Step 5: Run the core dbt transformations
      - name: Execute dbt Medallion Pipeline
        env:
          DBT_R2_ACCESS_KEY: ${{ secrets.R2_ACCESS_KEY }}
          DBT_R2_SECRET_KEY: ${{ secrets.R2_SECRET_KEY }}
          DBT_R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: |
          cd transform
          
          echo "
          transform:
            target: dev
            outputs:
              dev:
                type: duckdb
                path: dev.duckdb
                extensions:
                  - httpfs
                settings:
                  s3_access_key_id: \"{{ env_var('DBT_R2_ACCESS_KEY') }}\"
                  s3_secret_access_key: \"{{ env_var('DBT_R2_SECRET_KEY') }}\"
                  s3_endpoint: \"{{ env_var('DBT_R2_ENDPOINT') }}\"
                  s3_url_style: 'path'
                  s3_region: 'auto'
          " > profiles.yml
          
          dbt run --target dev