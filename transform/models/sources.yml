version: 2

sources:
  - name: cloudflare_r2
    description: "Raw clickstream event data bundles streaming into Cloudflare R2 bucket"
    loader: python_producer
    tables:
      - name: raw_events
        description: "The compressed Parquet batch files organized by hive-style date partitions"
        # 💡 FIX: Shifted from raw JSON to read_parquet, pointing to our new Hive structure
        external_location: "read_parquet('https://analytics-lakehouse.s3.amazonaws.com/raw/clickstream/dt=*/*.parquet')"